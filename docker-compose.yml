version: '3.8'

services:
  fashion-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: fashion-detection:latest
    container_name: fashion-detection-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - LOG_LEVEL=INFO
      - WANDB_MODE=offline
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./cache:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - fashion-network
    depends_on:
      - redis
      - mongodb

  redis:
    image: redis:7-alpine
    container_name: fashion-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fashion-network
    command: redis-server --appendonly yes

  mongodb:
    image: mongo:6
    container_name: fashion-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=fashion_detection
    volumes:
      - mongo-data:/data/db
    networks:
      - fashion-network

  nginx:
    image: nginx:alpine
    container_name: fashion-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - fashion-network
    depends_on:
      - fashion-api

  prometheus:
    image: prom/prometheus:latest
    container_name: fashion-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - fashion-network

  grafana:
    image: grafana/grafana:latest
    container_name: fashion-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - fashion-network
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: fashion-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - fashion-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.9.0
    container_name: fashion-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - fashion-network
    depends_on:
      - elasticsearch

volumes:
  redis-data:
  mongo-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

networks:
  fashion-network:
    driver: bridge