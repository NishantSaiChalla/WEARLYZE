# Hardware optimization
optimization:
  # ONNX export
  onnx:
    enabled: false
    opset_version: 16
    dynamic_axes: true
    simplify: true
    
  # TensorRT
  tensorrt:
    enabled: false
    fp16: true
    int8: false
    workspace_size: 4  # GB
    
  # Quantization
  quantization:
    enabled: false
    backend: "qnnpack"  # qnnpack, fbgemm
    calibration_samples: 1000

# Deployment configurations
deployment:
  # Docker
  docker:
    base_image: "pytorch/pytorch:2.0.0-cuda11.8-cudnn8-runtime"
    port: 8000
    
  # Kubernetes
  kubernetes:
    replicas: 3
    cpu_request: "2"
    memory_request: "4Gi"
    gpu_request: "1"
    
  # Model serving
  serving:
    framework: "torchserve"  # torchserve, triton, bentoml
    batch_size: 8
    max_batch_delay: 100  # ms
    timeout: 30  # seconds